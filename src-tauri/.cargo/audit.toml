# cargo-audit config. Run from src-tauri/:  cargo audit
#
# The ignore list below is ONLY advisories that do not affect the shipped macOS
# binary — verified with `cargo tree -i <crate>`. Every entry is an
# `unmaintained`/`unsound` warning (no fixable version), and is either:
#   (a) the Linux GTK3 webview backend (webkit2gtk) Tauri lists in Cargo.lock for
#       all targets but does NOT compile on macOS (`cargo tree -i gtk` is empty), or
#   (b) a build-time-only dep of tauri-build (not linked into the runtime binary).
# Real vulnerabilities (informational != ignored kinds) still fail the audit.
# Revisit this list if/when a Linux target is added.

[advisories]
ignore = [
  # --- Linux GTK3 webview backend (gtk-rs, unmaintained) — not compiled on macOS ---
  "RUSTSEC-2024-0411", # gdkwayland-sys
  "RUSTSEC-2024-0412", # gdk
  "RUSTSEC-2024-0413", # atk
  "RUSTSEC-2024-0414", # gdkx11-sys
  "RUSTSEC-2024-0415", # gtk
  "RUSTSEC-2024-0416", # atk-sys
  "RUSTSEC-2024-0417", # gdkx11
  "RUSTSEC-2024-0418", # gdk-sys
  "RUSTSEC-2024-0419", # gtk3-macros
  "RUSTSEC-2024-0420", # gtk-sys
  "RUSTSEC-2024-0429", # glib — unsound VariantStrIter (Linux glib, not in macOS build)

  # --- build-time only (tauri-build -> urlpattern -> unic-*; proc-macro) ---
  "RUSTSEC-2024-0370", # proc-macro-error (build macro, unmaintained)
  "RUSTSEC-2025-0075", # unic-char-range
  "RUSTSEC-2025-0080", # unic-common
  "RUSTSEC-2025-0081", # unic-char-property
  "RUSTSEC-2025-0098", # unic-ucd-version
  "RUSTSEC-2025-0100", # unic-ucd-ident
]
