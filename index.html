<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>instant</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body data-skin="xp">
    <div class="window summon" id="app">
      <div class="title-bar">
        <div class="title-bar-text">instant — summon</div>
        <div class="title-bar-controls">
          <button id="min-btn" aria-label="Minimize"></button>
          <button id="max-btn" aria-label="Maximize"></button>
          <button id="hide-btn" aria-label="Close"></button>
        </div>
      </div>

      <div class="toolbar">
        <button id="shot-btn" class="shot-btn" title="Screenshot region into the active terminal">
          ⛶ Shot
        </button>
        <button id="send-menu-btn" class="send-menu-btn" title="Send a screenshot or selection to a terminal…">
          ▾
        </button>
        <button id="mode-toggle" class="mode-toggle" title="Toggle dark mode">
          ☾
        </button>
        <span class="toolbar-spacer"></span>
        <button id="skin-toggle" class="skin-toggle">P5</button>
      </div>

      <div class="window-body body" id="workbench">
        <nav class="actbar" id="actbar">
          <!-- actbar-panels injected by plugin.tsx buildActivityRail() -->
          <span class="actbar-spacer"></span>
          <button class="actbar-item" id="actbar-toggle" title="Toggle compact/expanded">
            <span class="ai">⇆</span><span class="al">Collapse</span>
          </button>
        </nav>
        <div class="actbar-resize" id="actbar-resize" title="Drag to resize the rail"></div>
        <div class="dock" id="dock"></div>
      </div>

      <!-- Panel pool: parks terminal/browser/preview host elements between
           dockview mounts (see reactdock.tsx, terminal.ts, browser.ts). Every
           panel is a React `component` now; nothing is injected here. -->
      <div id="panel-pool" hidden></div>

      <div class="rz" data-dir="North"></div>
      <div class="rz" data-dir="South"></div>
      <div class="rz" data-dir="West"></div>
      <div class="rz" data-dir="East"></div>
      <div class="rz" data-dir="NorthWest"></div>
      <div class="rz" data-dir="NorthEast"></div>
      <div class="rz" data-dir="SouthWest"></div>
      <div class="rz" data-dir="SouthEast"></div>
    </div>
  </body>
</html>
