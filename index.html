<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>instant</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body data-skin="xp">
    <div class="window summon" id="app">
      <div class="title-bar" data-tauri-drag-region>
        <div class="title-bar-text">instant — summon</div>
        <div class="title-bar-controls">
          <button id="min-btn" aria-label="Minimize"></button>
          <button id="max-btn" aria-label="Maximize"></button>
          <button id="hide-btn" aria-label="Close"></button>
        </div>
      </div>

      <div class="toolbar">
        <button id="shot-btn" class="shot-btn" title="Screenshot region into the prompt">
          ⛶ Shot
        </button>
        <button id="mode-toggle" class="mode-toggle" title="Toggle dark mode">
          ☾
        </button>
        <button id="files-toggle" class="files-toggle" title="File explorer">📁 Files</button>
        <button id="wt-toggle" class="wt-toggle" title="Worktrees table">⊞ Worktrees</button>
        <button id="activity-toggle" class="activity-toggle" title="Activity history (captures, browser, files)">◉ Activity</button>
        <button id="config-toggle" class="config-toggle" title="Config & observation filters">⚙ Config</button>
        <button id="skin-toggle" class="skin-toggle">P5</button>
      </div>

      <div class="window-body body">
        <aside class="sidebar">
          <div class="sidebar-lists">
            <div class="sidebar-head">SESSIONS <span id="session-count" class="head-count"></span></div>
            <ul id="session-list" class="session-list"></ul>
            <div class="sidebar-head">SPACES</div>
            <ul id="workspace-list" class="session-list"></ul>
          </div>
          <div class="sidebar-create">
            <div class="quick-launch">
              <button id="ql-claude" type="button" class="ql-btn">+ claude</button>
              <button id="ql-opencode" type="button" class="ql-btn">+ opencode</button>
            </div>
            <form id="new-session" class="new-session">
              <input id="new-name" placeholder="new shell…" autocomplete="off" />
              <button type="submit">+</button>
            </form>
            <details class="space-create">
              <summary>+ new space (worktree + agent)</summary>
              <form id="new-workspace" class="new-session new-workspace">
                <input id="ws-repo" placeholder="repo path…" autocomplete="off" />
                <input id="ws-branch" placeholder="branch…" autocomplete="off" />
                <select id="ws-agent">
                  <option value="claude">claude</option>
                  <option value="opencode">opencode</option>
                </select>
                <button type="submit">+ space</button>
              </form>
            </details>
          </div>
        </aside>

        <div id="sidebar-resizer" class="resizer"></div>

        <section class="term-pane">
          <div id="tabs" class="tabs"></div>
          <div id="terminals" class="terminals"></div>
          <div id="worktrees-panel" class="side-panel worktrees-panel">
            <form id="wt-scan" class="wt-scan">
              <input id="wt-root" value="~/projects" autocomplete="off" />
              <button type="submit">Scan</button>
              <button id="wt-view" type="button">Table</button>
              <span id="wt-count" class="wt-count"></span>
            </form>
            <div id="wt-table" class="wt-table"></div>
          </div>
          <div id="files-panel" class="side-panel files-panel">
            <div class="fs-bar">
              <button id="fs-up" type="button" title="Up one folder">↑</button>
              <input id="fs-path" autocomplete="off" spellcheck="false" />
              <button id="fs-go" type="button">Go</button>
            </div>
            <div class="fs-body">
              <div id="fs-list" class="fs-list"></div>
              <div id="fs-preview" class="fs-preview"></div>
            </div>
          </div>
          <div id="activity-panel" class="side-panel activity-panel">
            <div class="act-bar">
              <input id="activity-search" class="act-search" placeholder="search…" autocomplete="off" spellcheck="false" />
              <span id="activity-count" class="wt-count"></span>
              <span class="spy-spacer"></span>
              <button id="activity-record" type="button" class="act-record">○ Record</button>
              <button id="activity-clear" type="button">Clear</button>
            </div>
            <div class="act-chips">
              <button class="act-chip" data-src="all" type="button">all</button>
              <button class="act-chip" data-src="session" type="button">sessions</button>
              <button class="act-chip" data-src="browser" type="button">browser</button>
              <button class="act-chip" data-src="os" type="button">screen</button>
              <button class="act-chip" data-src="files" type="button">files</button>
            </div>
            <div class="act-chips act-types">
              <button class="act-chip" data-type="all" type="button">all</button>
              <button class="act-chip" data-type="highlight" type="button">highlighted</button>
              <button class="act-chip" data-type="clip" type="button">copy/paste</button>
              <button class="act-chip" data-type="image" type="button">images</button>
              <button class="act-chip" data-type="file" type="button">files</button>
              <button class="act-chip" data-type="url" type="button">urls</button>
              <button class="act-chip" data-type="click" type="button">clicks</button>
            </div>
            <div class="fs-body">
              <div id="activity-table" class="fs-list"></div>
              <div id="activity-preview" class="fs-preview"></div>
            </div>
          </div>
          <div id="config-panel" class="side-panel config-panel">
            <div class="act-bar">
              <span class="spy-title">config</span>
              <span id="config-meta" class="wt-count"></span>
              <span class="spy-spacer"></span>
              <button id="config-reload" type="button">Reload</button>
              <button id="config-open" type="button">Open file</button>
            </div>
            <div id="config-body" class="cfg-body"></div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
